# --- Bring-up / debugging ---
# USB serial logging - lets you `west espressif monitor` / minicom into the
# USB CDC-ACM port and see ZMK's boot log + kscan events. Very useful the
# first time you power this on to confirm the matrix is actually wired the
# way chamomile.dtsi assumes. Safe to turn off once things are working -
# it adds a bit to flash size and very slightly to boot time.
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG=y
CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
# --- Kscan debounce ---
# Defaults (5ms press / 5ms release) are tuned for typical mechanical
# switches and are almost always fine. Choc v1 switches don't need special
# tuning, but if you ever get phantom double-taps on the hotswap sockets,
# these are the first things to raise. Left commented since defaults
# should be correct - uncomment only if you see chatter.
# CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
# CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# --- Power management ---
# Enables deep sleep when idle (BLE radio + most peripherals power down).
# Worth having on for a battery-powered split half.
CONFIG_ZMK_SLEEP=y

# How long (ms) with no activity before entering deep sleep. Default is
# 15 minutes (900000ms); shortening this saves battery at the cost of a
# ~1s wake-up delay on the next keypress after a long pause.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# How long (ms) with no activity before ZMK reduces BLE connection
# frequency to save power, without fully sleeping. Shorter = better
# battery, longer = lower latency waking from a brief pause.
CONFIG_ZMK_IDLE_TIMEOUT=30000

# --- Battery reporting ---
# Reports battery percentage over BLE if the Xiao BLE's fuel gauge /
# battery ADC is wired up. Harmless to leave on even if you're running
# USB-powered only - it'll just report inaccurately or stay quiet.
CONFIG_ZMK_BATTERY_REPORTING=y
